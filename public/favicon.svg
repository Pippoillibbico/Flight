  <!-- Rounded-square background -->
  <rect width="64" height="64" rx="13" ry="13" fill="url(#bg)"/>

  <!--
    Jetly glyph: J stem + bottom hook + upward arrow arm
    All in one connected path for clean rendering at any size.
  -->
