    d="
      M 28 11
      L 40 11
      L 50 21
      L 44 21
      L 40 17
      L 40 43
      Q 40 55 27 55
      Q 16 55 13 46
    "
    fill="none"
    stroke="url(#j)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
