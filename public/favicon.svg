<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0c1629"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="j" gradientUnits="userSpaceOnUse" x1="14" y1="10" x2="50" y2="54">
      <stop offset="0%"   stop-color="#70bbff"/>
      <stop offset="50%"  stop-color="#2176f5"/>
      <stop offset="100%" stop-color="#0d48d0"/>
