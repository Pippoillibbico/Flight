services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      TRUST_PROXY: ${TRUST_PROXY:-1}
      REQUIRE_PRIMARY_INFRA_IN_PRODUCTION: "true"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      TRUST_PROXY: ${TRUST_PROXY:-1}
      REQUIRE_PRIMARY_INFRA_IN_PRODUCTION: "true"
    command: ["node", "server/worker.js"]
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH:-./certs/fullchain.pem}:/etc/nginx/tls/fullchain.pem:ro
      - ${TLS_KEY_PATH:-./certs/privkey.pem}:/etc/nginx/tls/privkey.pem:ro
    depends_on:
      api:
        condition: service_healthy

